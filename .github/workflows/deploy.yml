name: Deploy HTML to AWS S3 with CloudWatch Monitoring

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  S3_BUCKET: roberts-html-deploy-2026
  CLOUDWATCH_NAMESPACE: StudentDeployments
  APP_NAME: aws-s3-html-deploy

jobs:
  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::754217996081:role/GitHubActionsS3DeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy files to S3
        id: deploy
        run: |
          aws s3 sync . s3://${{ env.S3_BUCKET }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*"

      - name: Send success metric to CloudWatch
        if: success()
        run: |
          aws cloudwatch put-metric-data \
            --namespace "${{ env.CLOUDWATCH_NAMESPACE }}" \
            --metric-name DeploySuccess \
            --value 1 \
            --unit Count \
            --dimensions AppName=${{ env.APP_NAME }},Environment=dev

      - name: Send failure metric to CloudWatch
        if: failure()
        run: |
          aws cloudwatch put-metric-data \
            --namespace "${{ env.CLOUDWATCH_NAMESPACE }}" \
            --metric-name DeployFailure \
            --value 1 \
            --unit Count \
            --dimensions AppName=${{ env.APP_NAME }},Environment=dev
          aws s3 sync . s3://${{ env.S3_BUCKET }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*"
